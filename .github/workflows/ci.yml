name: "CI — imm-web"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Quality Gate — Lint, Typecheck & Unit Tests
  #    Consolidado em um único job: o overhead de setup (~15s)
  #    é maior que o tempo de execução (~6s), então separar
  #    em jobs distintos desperdiça minutos do GitHub Actions.
  # ─────────────────────────────────────────────────────────────
  quality:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint)
        run: yarn lint

      - name: Format check (Prettier)
        run: yarn format:check

      - name: Type check (tsc)
        run: yarn tsc --noEmit

      - name: Unit & Integration tests
        run: yarn test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. E2E Tests (Playwright)
  #    Separado porque precisa de build do Next.js + browser,
  #    o que justifica um job dedicado com cache próprio.
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css', '**/*.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-
            nextjs-${{ runner.os }}-

      - name: Build Next.js
        run: yarn build

      - name: Run E2E tests
        run: yarn test:e2e

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/report/
          retention-days: 7
