name: CD — Deploy (Vercel)

on:
  workflow_run:
    workflows: ["CI — imm-web"]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to Vercel (${{ github.ref_name || github.event.workflow_run.head_branch }})"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: ${{ (github.ref_name || github.event.workflow_run.head_branch) == 'main' && 'production' || 'homolog' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v41.1.4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ (github.ref_name || github.event.workflow_run.head_branch) == 'main' && '--prod' || '' }}
