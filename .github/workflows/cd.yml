name: "CD — Deploy (Vercel)"

on:
  push:
    branches:
      - main # → Produção Vercel
      - develop # → Preview Vercel

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to Vercel (${{ github.ref_name }})"
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://inside-my-mind.vercel.app' || 'https://inside-my-mind-dev.vercel.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install Vercel CLI
        run: yarn global add vercel@latest

      - name: Install system dependencies for Playwright
        run: sudo apt-get install libevent-2.1-7t64 libavif16

      - name: Install Playwright Browsers
        run: yarn playwright install

      - name: Pull Vercel environment info
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Build project via Vercel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deploy concluído: $DEPLOY_URL"

      - name: Print deployment URL
        run: |
          echo "🌐 Frontend disponível em: ${{ steps.deploy.outputs.url }}"
