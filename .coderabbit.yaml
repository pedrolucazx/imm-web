# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit Configuration — imm-web (Frontend)
# Documentação: https://docs.coderabbit.ai/guides/configure-coderabbit

language: "pt-BR"

tone_instructions: "Frontend Next.js 15 + Chakra UI v3 (neo-brutalism). Revisar em pt-BR. Priorizar: a11y, Chakra v3 sem prefixo 'is' (open/disabled/invalid), VStack/HStack, colorPalette, react-hook-form, TanStack Query."

reviews:
  profile: "assertive"
  request_changes_workflow: false  # IA NÃO bloqueia merge — apenas comenta
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/playwright-report/**"
    - "!yarn.lock"
    - "!package-lock.json"

chat:
  auto_reply: true
