name: CI — imm-web

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write # Necessário para o CodeRabbit

jobs:
  quality_and_e2e:
    name: "Quality Gate (Lint, Types, Tests) & E2E"
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3333

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: "Install dependencies"
        run: yarn install --frozen-lockfile

      - name: "Code Quality: Lint"
        run: yarn lint

      - name: "Code Quality: Format Check"
        run: yarn format:check

      - name: "Code Quality: Typecheck"
        run: yarn tsc --noEmit

      - name: "Code Quality: Tests Coverage"
        run: yarn test:coverage

      - name: "Upload coverage report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: "Step 2: E2E Tests"
        run: |
          yarn playwright install --with-deps chromium
          yarn build
          yarn test:e2e

      - name: "Step 3: AI Code Review (CodeRabbit)"
        uses: coderabbitai/ai-pr-reviewer@v0.7.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
