name: "CD — Deploy (Vercel)"

on:
  push:
    branches:
      - main # → Produção Vercel
      - develop # → Preview Vercel

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to Vercel (${{ github.ref_name }})"
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://inside-my-mind.vercel.app' || 'https://inside-my-mind-dev.vercel.app' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install Vercel CLI
        run: yarn global add vercel@50.22.1

      - name: Pull Vercel environment info
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel pull --yes --environment=production
          else
            vercel pull --yes --environment=preview
          fi

      - name: Build project via Vercel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel build --prod
          else
            vercel build
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod | tail -1)
          else
            DEPLOY_URL=$(vercel deploy --prebuilt | tail -1)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deploy concluído: $DEPLOY_URL"

      - name: Print deployment URL
        run: |
          echo "🌐 Frontend disponível em: ${{ steps.deploy.outputs.url }}"
